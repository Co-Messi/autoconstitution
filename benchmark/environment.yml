  - pytest=8.0.0
  - pip:
    - llama-cpp-python==0.2.90
    - pydantic==2.7.0
    - structlog==24.1.0
    - rich==13.7.0
    - tqdm==4.66.1
    - click==8.1.7
    - autoconstitution-benchmark==1.0.0
