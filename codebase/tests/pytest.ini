[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async mode
asyncio_mode = auto

# Test output
verbose = 1
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    kimi: marks tests as Kimi provider tests
    anthropic: marks tests as Anthropic provider tests
    openai: marks tests as OpenAI provider tests
    ollama: marks tests as Ollama provider tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage (optional, requires pytest-cov)
# addopts = --cov=autoconstitution.providers --cov-report=term-missing
